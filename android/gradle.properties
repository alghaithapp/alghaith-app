# Heap + Metaspace: Metaspace OOM during Kotlin plugin compile needs larger MaxMetaspaceSize.
org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=1536m -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
kotlin.compiler.execution.strategy=in-process
kotlin.daemon.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=1024m
# One worker at a time — avoids multiple Kotlin compilers exhausting Metaspace on Windows.
org.gradle.workers.max=1
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.configureondemand=false
android.useAndroidX=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=true
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
