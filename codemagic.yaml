# Codemagic — بناء iOS لتطبيق الغيث ورفعه إلى TestFlight
# التوثيق: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
#
# مهم: إذا ظهر خطأ Scheme "Runner" not found أثناء "Install Flutter dependencies"
# فأنت تستخدم Workflow Editor وليس هذا الملف. الحل:
#   1) Start new build → اختر workflow: "Al-Ghaith iOS Release" (ios-release)
#   أو
#   2) Workflow Editor → Post-clone script → flutter pub get
#      (أو: bash scripts/codemagic_post_clone.sh)

workflows:
  ios-release:
    name: Al-Ghaith iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    # اسم مفتاح App Store Connect API كما سجّلته في:
    # Codemagic → Team settings → Integrations → App Store Connect
    integrations:
      # يجب أن يطابق اسم المفتاح في Integrations → Developer Portal (عندك: algaith)
      app_store_connect: algaith

    environment:
      flutter: stable
      xcode: latest # Apple requires iOS 26 SDK (Xcode 26+) for App Store uploads
      cocoapods: default
      groups:
        # أضف المجموعة في Codemagic → Environment variables → Group: firebase_credentials
        - firebase_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alghaith.app
      vars:
        # Team ID من Apple (Gaith Mohammed) — يظهر في App Store profile
        APPLE_TEAM_ID: "4THW4SKM37"
        CM_FLUTTER_SCHEME: Runner
        XCODE_SCHEME: Runner
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        DATABASE_BACKEND_BASE_URL: https://alghaith-app-production.up.railway.app
        PHONE_AUTH_BASE_URL: https://lively-wind-9d98.alghaithapp.workers.dev
        # أضِف MAPBOX_PUBLIC_TOKEN (pk.eyJ...) في Codemagic (Secure) و/أو Railway.
        # بدونها يُحمّل المفتاح من GET /maps/public-token على الخادم عند تشغيل التطبيق.

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: false # إيقاف البناء التلقائي لـ iOS — شغّل يدوياً من Codemagic

    scripts:
      # يجب توليد ملفات iOS قبل use-profiles حتى يُعثر Codemagic على Scheme Runner
      - name: Verify iOS project and scheme
        script: |
          set -e
          test -f pubspec.yaml
          test -f ios/Runner/Info.plist
          test -f ios/Runner.xcodeproj/project.pbxproj
          test -f ios/Runner.xcworkspace/contents.xcworkspacedata
          test -f ios/Runner.xcodeproj/xcshareddata/xcschemes/Runner.xcscheme
          echo "Runner scheme files OK"

      # ملفات Firebase: متغيرات سرية base64 في مجموعة firebase_credentials
      - name: Set up Firebase config files
        script: |
          set -e
          if [ -n "$IOS_GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$IOS_GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
            echo "Wrote ios/Runner/GoogleService-Info.plist"
          fi
          if [ -n "$ANDROID_GOOGLE_SERVICES_JSON" ]; then
            echo "$ANDROID_GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
            echo "Wrote android/app/google-services.json"
          fi
          if [ ! -f ios/Runner/GoogleService-Info.plist ]; then
            echo "Missing IOS_GOOGLE_SERVICE_INFO_PLIST in group firebase_credentials"
            exit 1
          fi
          echo "Firebase iOS config OK"

      - name: Get Flutter packages
        script: |
          set -e
          flutter config --no-enable-swift-package-manager
          flutter pub get
          flutter precache --ios

      - name: Install CocoaPods dependencies
        script: |
          set -e
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks ios/Flutter/ephemeral/Packages
          if [ -f ios/Podfile ]; then
            cd ios && pod install --repo-update
          else
            find . -name Podfile -not -path "*/.*/*" -execdir pod install --repo-update \;
          fi

      - name: Prepare iOS bundle resources
        script: |
          set -e
          cp -f assets/sounds/alghaith_incoming_call.wav ios/Runner/alghaith_incoming_call.wav
          test -s ios/Runner/alghaith_incoming_call.wav
          echo "iOS notification sounds OK"

      - name: Set up keychain and certificates
        script: |
          set -e
          keychain initialize
          keychain add-certificates

      - name: Set up code signing on Xcode project
        script: |
          set -e
          xcode-project use-profiles --project ios/Runner.xcodeproj
          if ! grep -q "PROVISIONING_PROFILE_SPECIFIER" ios/Runner.xcodeproj/project.pbxproj; then
            echo "ERROR: PROVISIONING_PROFILE_SPECIFIER missing after use-profiles."
            echo "Upload App Store certificate + provisioning profile for com.alghaith.app in Codemagic → Code signing identities."
            exit 1
          fi
          echo "Code signing settings in Runner.xcodeproj:"
          grep -E "PROVISIONING_PROFILE_SPECIFIER|CODE_SIGN_IDENTITY|DEVELOPMENT_TEAM" ios/Runner.xcodeproj/project.pbxproj | head -20

      - name: Verify iOS code signing
        script: |
          set -e
          EXPORT_PLIST="/Users/builder/export_options.plist"
          if [ ! -f "$EXPORT_PLIST" ] && [ -f "$HOME/export_options.plist" ]; then
            EXPORT_PLIST="$HOME/export_options.plist"
          fi
          if [ ! -f "$EXPORT_PLIST" ]; then
            echo "ERROR: export_options.plist غير موجود."
            echo "تحقق من Codemagic → Code signing → شهادة Distribution + Profile لـ com.alghaith.app"
            echo "وتحقق من Integrations → App Store Connect (algaith)"
            exit 1
          fi
          echo "export_options.plist OK: $EXPORT_PLIST"
          ls -la "$EXPORT_PLIST"
          security find-identity -v -p codesigning | head -20

      - name: Compile Flutter iOS (no codesign)
        script: |
          set -euxo pipefail
          flutter --version
          xcodebuild -version
          flutter build ios --release --no-codesign \
            --dart-define=DATABASE_BACKEND_BASE_URL="$DATABASE_BACKEND_BASE_URL" \
            --dart-define=PHONE_AUTH_BASE_URL="$PHONE_AUTH_BASE_URL" \
            --dart-define=MAPBOX_PUBLIC_TOKEN="${MAPBOX_PUBLIC_TOKEN:-}"

      - name: Build and export iOS IPA
        script: |
          set -euxo pipefail
          LOG_FILE="/tmp/xcode_build_ipa.log"
          set +e
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --archive-flags="-destination generic/platform=iOS" \
            2>&1 | tee "$LOG_FILE"
          BUILD_STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$BUILD_STATUS" -ne 0 ]; then
            echo "========== IPA BUILD FAILED =========="
            grep -E "error:|Error:|fatal error|ARCHIVE FAILED|CodeSign|Provisioning|ConformanceIsolation" "$LOG_FILE" | tail -80 || true
            echo "========== LAST 200 LOG LINES =========="
            tail -200 "$LOG_FILE" || true
            exit 1
          fi
          ls -la build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/*.dSYM.zip
      - /tmp/xcodebuild_logs/*.log
      - /tmp/xcode_build_ipa.log

    publishing:
      email:
        recipients:
          - alghaithapp@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
