name: alghaith_app
description: "Al-Ghaith - Professional Service & Shopping App in Iraq"
version: 1.2.48+80

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  supabase_flutter: ^2.6.0
  google_sign_in: ^6.2.1
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  animate_do: ^3.3.4
  url_launcher: ^6.3.0
  package_info_plus: ^8.3.0
  http: ^1.2.2
  mapbox_maps_flutter: any
  geolocator: ^13.0.2
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - shorebird.yaml

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/logo.png
