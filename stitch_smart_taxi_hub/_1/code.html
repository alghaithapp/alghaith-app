<script>
        document.addEventListener('DOMContentLoaded', () => {
            const statusBtn = document.getElementById('status-btn');
            const statusText = document.getElementById('status-text');
            const statusIcon = document.getElementById('status-icon');
            
            let currentState = 0; // 0: Arrived, 1: Start Trip, 2: Complete Trip

            statusBtn.addEventListener('click', () => {
                currentState = (currentState + 1) % 3;
                
                // Add simple animation effect
                statusText.style.opacity = 0;
                statusIcon.style.opacity = 0;
                statusBtn.style.transform = 'scale(0.98)';
                
                setTimeout(() => {
                    if (currentState === 0) {
                        statusText.textContent = 'وصلت';
                        statusIcon.textContent = 'location_on';
                        statusBtn.className = 'w-full h-14 rounded-lg bg-secondary-container text-on-secondary-container font-title-sm text-title-sm flex items-center justify-center gap-sm hover:opacity-90 active:scale-95 transition-all shadow-md';
                    } else if (currentState === 1) {
                        statusText.textContent = 'بدأت الرحلة';
                        statusIcon.textContent = 'play_arrow';
                        statusBtn.className = 'w-full h-14 rounded-lg bg-primary text-on-primary font-title-sm text-title-sm flex items-center justify-center gap-sm hover:opacity-90 active:scale-95 transition-all shadow-md';
                    } else {
                        statusText.textContent = 'اكتملت الرحلة';
                        statusIcon.textContent = 'check_circle';
                        statusBtn.className = 'w-full h-14 rounded-lg bg-tertiary-fixed-dim text-on-tertiary-fixed-variant font-title-sm text-title-sm flex items-center justify-center gap-sm hover:opacity-90 active:scale-95 transition-all shadow-md';
                    }
                    
                    statusText.style.opacity = 1;
                    statusIcon.style.opacity = 1;
                    statusBtn.style.transform = 'scale(1)';
                }, 150);
            });
        });
    </script>
